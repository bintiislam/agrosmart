<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgroSmart - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  
  <div class="navbar">
    <div class="logo">🌿 <span>AgroSmart</span></div>
  </div>

  
  <div class="page-container">
    <div class="login-page">

      <div class="login-box">
        <h2>Login to AgroSmart</h2>

        
        <div id="loginForm">
          <div class="form-group">
            <input type="text" id="loginEmail" placeholder="Email" />
          </div>
          <div class="form-group">
            <input type="password" id="loginPassword" placeholder="Password" />
          </div>
          <button class="btn btn-green" onclick="doLogin()">Login</button>
          <br><br>
          <button class="btn btn-outline" onclick="showSignup()">Sign Up</button>
          <br><br>
          <span class="forgot">Forgot Password?</span>
        </div>

        
        <div id="signupForm" style="display:none;">
          <div class="form-group">
            <input type="text" id="signupName" placeholder="Full Name" />
          </div>
          <div class="form-group">
            <input type="text" id="signupEmail" placeholder="Email" />
          </div>
          <div class="form-group">
            <input type="password" id="signupPassword" placeholder="Password" />
          </div>
          <div class="form-group">
            <input type="text" id="signupMobile" placeholder="Mobile Number" />
          </div>
          <div class="form-group">
            <input type="text" id="signupLocation" placeholder="Location" />
          </div>
          <button class="btn btn-green" onclick="doSignup()">Create Account</button>
          <br><br>
          <button class="btn btn-outline" onclick="showLogin()">Back to Login</button>
        </div>

        
        <div id="loadingMsg" style="display:none; color:#4a7c3f; margin-top:10px;">
          Please wait...
        </div>

        <div class="login-img">🧑‍🌾</div>

        <div class="btn-row" style="justify-content:center; margin-top:15px;">
          <a href="role.html" class="btn btn-back btn-small">Back</a>
          <a href="index.html" class="btn btn-back btn-small">Return Home</a>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    
    const firebaseConfig = {
      apiKey: "AIzaSyB2C0Uf6NWWqUkp3kCAeAoFXq7k5GeVzgc",
      authDomain: "agrosmart-4e1fe.firebaseapp.com",
      projectId: "agrosmart-4e1fe",
      storageBucket: "agrosmart-4e1fe.firebasestorage.app",
      messagingSenderId: "448300580974",
      appId: "1:448300580974:web:0ae670c92892f1ae77267f"
    };

    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role') || 'farmer';

    
    window.doLogin = async function() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert('Please fill in all fields!');
        return;
      }

      document.getElementById('loadingMsg').style.display = 'block';

      try {
        
        const q = query(
          collection(db, "users"),
          where("email", "==", email),
          where("password", "==", password)
        );
        const snapshot = await getDocs(q);

        document.getElementById('loadingMsg').style.display = 'none';

        if (!snapshot.empty) {
          const user = snapshot.docs[0].data();
          
          localStorage.setItem('loggedInUser', JSON.stringify(user));

          
          if (user.role === 'farmer') {
            window.location.href = 'farmer-dashboard.html';
          } else if (user.role === 'student') {
            window.location.href = 'student-dashboard.html';
          } else if (user.role === 'worker') {
            window.location.href = 'agri-dashboard.html';
          }
        } else {
          alert('Wrong email or password! Please sign up first.');
        }
      } catch (e) {
        document.getElementById('loadingMsg').style.display = 'none';
        alert('Error: ' + e.message);
      }
    }

    
    window.doSignup = async function() {
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const mobile = document.getElementById('signupMobile').value;
      const location = document.getElementById('signupLocation').value;

      if (!name || !email || !password) {
        alert('Please fill name, email and password!');
        return;
      }

      document.getElementById('loadingMsg').style.display = 'block';

      try {
        
        const newUser = {
          name: name,
          email: email,
          password: password,
          mobile: mobile,
          location: location,
          role: role,
          userId: 'USR' + Date.now()
        };

        await addDoc(collection(db, "users"), newUser);

        document.getElementById('loadingMsg').style.display = 'none';
        alert('Account created successfully! Please login now.');
        showLogin();

      } catch (e) {
        document.getElementById('loadingMsg').style.display = 'none';
        alert('Error: ' + e.message);
      }
    }

    
    window.showSignup = function() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('signupForm').style.display = 'block';
    }

    window.showLogin = function() {
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    }
  </script>

</body>
</html>
