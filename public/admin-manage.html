<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgroSmart - Admin Manage</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  
  <div class="navbar">
    <div class="logo">🌿 <span>AgroSmart</span></div>
    <nav>
      <span style="color:#2d5a27; font-weight:600;">Admin</span>
      &nbsp;&nbsp;
      <a href="index.html" onclick="adminLogout()">Logout</a>
    </nav>
  </div>

  
  <div class="dashboard-layout">

    
    <div class="sidebar">
      <a href="admin-dashboard.html">Profile</a>
      <a href="admin-dashboard.html">Manage Crops</a>
      <a href="admin-dashboard.html">Manage Users</a>
      <a href="admin-manage.html" class="active">Manage Content</a>
      <a href="seasonal-guide.html">Seasonal Data</a>
      <a href="crop-info.html">Crop Information</a>
      <a href="fertilizer-guide.html">Fertilizer Information</a>
    </div>

    
    <div class="dashboard-content">

      <h2 style="color:#2d5a27; margin-bottom:25px;">Admin Dashboard</h2>

      
      <div style="margin-bottom: 30px;">
        <div class="admin-section-title">
          <h3>👥 Manage Users</h3>
          <button class="btn btn-green btn-small">Edit</button>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Role</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="usersBody">
          </tbody>
        </table>
      </div>

      
      <div style="margin-bottom: 30px;">
        <div class="admin-section-title">
          <h3>📋 Manage Content</h3>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Content</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Fertilizer Guide</td>
              <td>
                <button class="btn btn-green btn-small" onclick="window.location.href='fertilizer-guide.html'">Edit</button>
              </td>
            </tr>
            <tr>
              <td>Seasonal Data</td>
              <td>
                <button class="btn btn-green btn-small" onclick="window.location.href='seasonal-guide.html'">Edit</button>
              </td>
            </tr>
            <tr>
              <td>Crop Information</td>
              <td>
                <button class="btn btn-green btn-small" onclick="window.location.href='crop-info.html'">Edit</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      
      <div class="btn-row">
        <button class="btn btn-back" onclick="history.back()">Back</button>
        <a href="index.html" class="btn btn-back">Return Home</a>
      </div>

    </div>
  </div>

  <script>
    if (localStorage.getItem('adminLogged') !== 'true') {
      window.location.href = 'login-admin.html';
    }

    function loadUsers() {
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const tbody = document.getElementById('usersBody');

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">No users yet</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u =>
        `<tr>
          <td>${u.name}</td>
          <td style="text-transform:capitalize;">${u.role}</td>
          <td class="status-active">Active</td>
        </tr>`
      ).join('');
    }

    loadUsers();

    function adminLogout() {
      localStorage.removeItem('adminLogged');
    }
  </script>

</body>
</html>
